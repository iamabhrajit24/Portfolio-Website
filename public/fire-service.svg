<svg xmlns="http://www.svg.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a15" />
      <stop offset="50%" stop-color="#0a152e" />
      <stop offset="100%" stop-color="#050a15" />
    </linearGradient>
    
    <!-- Neon Blue Glow for Shield -->
    <filter id="neonBlueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Neon Purple Glow for Flame -->
    <filter id="neonPurpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0.3" />
    </linearGradient>

    <!-- Flame Gradient -->
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7000ff" />
      <stop offset="50%" stop-color="#b500ff" />
      <stop offset="100%" stop-color="#ff00f3" />
    </linearGradient>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Background Ambient Glows -->
  <circle cx="400" cy="300" r="250" fill="#00f3ff" opacity="0.1" filter="url(#neonBlueGlow)" />
  <circle cx="400" cy="350" r="180" fill="#b500ff" opacity="0.1" filter="url(#neonPurpleGlow)" />

  <g transform="translate(400, 300)">
    <!-- Outer Shield Frame -->
    <path d="M 0 -180 C 80 -180 150 -140 170 -60 C 180 20 150 120 0 200 C -150 120 -180 20 -170 -60 C -150 -140 -80 -180 0 -180 Z" 
          fill="url(#shieldGrad)" 
          stroke="#00f3ff" 
          stroke-width="4" 
          filter="url(#neonBlueGlow)" />
    
    <!-- Inner Shield Depth -->
    <path d="M 0 -160 C 65 -160 125 -125 145 -55 C 155 15 125 105 0 170 C -125 105 -155 15 -145 -55 C -125 -125 -65 -160 0 -160 Z" 
          fill="#050a15" 
          stroke="#0066ff" 
          stroke-width="2" />
          
    <!-- Stylized Fire / Flame inside the shield -->
    <path d="M 0 110 C -60 110 -90 50 -90 0 C -90 -50 -50 -100 0 -130 C -20 -90 -10 -40 20 -20 C 10 -50 40 -80 60 -50 C 90 0 70 110 0 110 Z" 
          fill="url(#flameGrad)" 
          filter="url(#neonPurpleGlow)" />
          
    <!-- Flame inner highlight -->
    <path d="M 0 80 C -35 80 -55 40 -55 5 C -55 -25 -30 -55 0 -80 C -15 -50 -5 -25 10 -15 C 5 -35 25 -55 35 -35 C 55 -5 45 80 0 80 Z" 
          fill="#ffffff" 
          opacity="0.8" />
  </g>

  <!-- High-tech Accents / Corner borders -->
  <path d="M 50 80 L 50 50 L 80 50" fill="none" stroke="#00f3ff" stroke-width="3" />
  <path d="M 750 80 L 750 50 L 720 50" fill="none" stroke="#00f3ff" stroke-width="3" />
  <path d="M 50 520 L 50 550 L 80 550" fill="none" stroke="#00f3ff" stroke-width="3" />
  <path d="M 750 520 L 750 550 L 720 550" fill="none" stroke="#00f3ff" stroke-width="3" />
  
  <!-- Data dots and lines representing tech/AI focus -->
  <circle cx="100" cy="150" r="3" fill="#b500ff" filter="url(#neonPurpleGlow)"/>
  <circle cx="120" cy="120" r="2" fill="#00f3ff" />
  <line x1="100" y1="150" x2="120" y2="120" stroke="#00f3ff" stroke-width="1" opacity="0.5" />
  
  <circle cx="700" cy="450" r="4" fill="#00f3ff" filter="url(#neonBlueGlow)"/>
  <circle cx="660" cy="480" r="2" fill="#b500ff" />
  <line x1="700" y1="450" x2="660" y2="480" stroke="#b500ff" stroke-width="1" opacity="0.5" />
</svg>
