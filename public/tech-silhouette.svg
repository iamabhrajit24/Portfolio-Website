<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Desk -->
  <rect x="20" y="170" width="160" height="10" rx="3" fill="#000" />
  
  <!-- Person Torso -->
  <path d="M 40 170 L 40 120 Q 40 80 80 80 Q 100 80 110 100 L 120 170 Z" fill="#000" />
  
  <!-- Person Head -->
  <circle cx="80" cy="50" r="25" fill="#000" />
  
  <!-- Laptop Base -->
  <rect x="110" y="160" width="60" height="10" rx="2" fill="#000" />
  
  <!-- Laptop Screen -->
  <polygon points="120,160 160,160 150,110 115,110" fill="#000" />
  
  <!-- Arm -->
  <path d="M 80 100 Q 110 130 130 150" fill="none" stroke="#000" stroke-width="15" stroke-linecap="round" />
</svg>
